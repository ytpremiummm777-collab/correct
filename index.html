<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>STUDY COMMAND CENTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: white; font-family: -apple-system, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-blue { color: #00d1ff; text-shadow: 0 0 15px rgba(0,209,255,0.6); }
        .input-gamer { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px; color: white; outline: none; }
        .input-gamer:focus { border-color: #00d1ff; }
    </style>
</head>
<body class="p-6 pt-16 select-none">

    <header class="mb-6">
        <h1 class="text-2xl font-black italic neon-blue uppercase tracking-tighter">Mission<span class="text-white">Control</span></h1>
        <p id="current-task-display" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-1">Aguardando definição de objetivo...</p>
    </header>

    <section id="setup-area" class="glass p-5 rounded-[24px] mb-6 space-y-4">
        <h2 class="text-[9px] font-black text-gray-500 uppercase tracking-widest">Configurar Missão</h2>
        
        <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold text-gray-400">MATÉRIA / TEMA</label>
            <input type="text" id="task-input" placeholder="Ex: Matemática, Redação..." class="input-gamer text-sm">
        </div>

        <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold text-gray-400">TEMPO DA MISSÃO (MINUTOS)</label>
            <input type="number" id="time-input" placeholder="25" min="1" max="120" class="input-gamer text-sm">
        </div>

        <button onclick="applySettings()" class="w-full bg-white/10 hover:bg-white/20 py-3 rounded-xl text-xs font-black uppercase transition-all">
            Confirmar Configurações
        </button>
    </section>

    <section class="glass p-8 rounded-[40px] text-center mb-8 relative overflow-hidden">
        <div id="timer-display" class="text-6xl font-mono font-black mb-8 tracking-tighter transition-all">25:00</div>
        
        <div class="flex gap-3">
            <button id="start-btn" onclick="toggleTimer()" class="flex-[2] bg-[#00d1ff] text-black font-black py-4 rounded-2xl active:scale-95 transition-all uppercase text-sm">
                Iniciar Missão
            </button>
            <button onclick="resetTimer()" class="flex-1 bg-white/5 border border-white/10 rounded-2xl active:rotate-180 transition-all duration-500">
                🔄
            </button>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 w-full p-8 flex justify-around bg-black/60 backdrop-blur-xl border-t border-white/5">
        <span class="text-xl" onclick="location.reload()">🏠</span>
        <span class="text-xl neon-blue">🔥</span>
        <span class="text-xl opacity-20">⚙️</span>
    </nav>

    <script>
        let timeLeft = 25 * 60;
        let timerId = null;
        let isRunning = false;

        const display = document.getElementById('timer-display');
        const startBtn = document.getElementById('start-btn');
        const taskInput = document.getElementById('task-input');
        const timeInput = document.getElementById('time-input');
        const taskDisplay = document.getElementById('current-task-display');

        function applySettings() {
            const task = taskInput.value || "Estudo Geral";
            const time = parseInt(timeInput.value) || 25;
            
            timeLeft = time * 60;
            taskDisplay.textContent = `OBJETIVO: ${task.toUpperCase()}`;
            taskDisplay.style.color = "#00ff88";
            updateDisplay();
            
            // Feedback visual de sucesso
            alert("Configurações aplicadas!");
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            display.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerId);
                isRunning = false;
                startBtn.textContent = "Retomar";
                startBtn.classList.replace('bg-[#00ff88]', 'bg-[#00d1ff]');
            } else {
                isRunning = true;
                startBtn.textContent = "Pausar";
                startBtn.style.background = "#ff4e00"; // Cor de "alerta" ao rodar
                startBtn.style.color = "white";
                
                timerId = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(timerId);
                        isRunning = false;
                        alert("MISSÃO CONCLUÍDA! FIM DA SESSÃO 🏆");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            isRunning = false;
            const time = parseInt(timeInput.value) || 25;
            timeLeft = time * 60;
            updateDisplay();
            startBtn.textContent = "Iniciar Missão";
            startBtn.style.background = "#00d1ff";
            startBtn.style.color = "black";
        }
    </script>
</body>
</html>
