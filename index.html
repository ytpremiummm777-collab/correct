<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FPS Web Demo</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:16px;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
color:white;
}

#info{
position:absolute;
bottom:10px;
left:10px;
color:white;
font-size:12px;
}
</style>

</head>
<body>

<div id="crosshair">+</div>
<div id="hud">HP:100 | Ammo:30</div>
<div id="info">WASD mover | Shift correr | Space pular | Ctrl agachar | R recarregar | Clique atirar</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/examples/js/controls/PointerLockControls.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls = new THREE.PointerLockControls(camera, document.body)

document.body.addEventListener("click",()=>{
controls.lock()
})

scene.add(controls.getObject())

// luz
const light = new THREE.HemisphereLight(0xffffff,0x444444)
scene.add(light)

// chão
const floorGeo = new THREE.PlaneGeometry(200,200)
const floorMat = new THREE.MeshStandardMaterial({color:0x333333})
const floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
scene.add(floor)

// paredes simples
for(let i=0;i<20;i++){

let box = new THREE.Mesh(
new THREE.BoxGeometry(3,3,3),
new THREE.MeshStandardMaterial({color:0x555555})
)

box.position.set(
(Math.random()-0.5)*100,
1.5,
(Math.random()-0.5)*100
)

scene.add(box)

}

// arma simples
let gun = new THREE.Mesh(
new THREE.BoxGeometry(0.3,0.2,1),
new THREE.MeshStandardMaterial({color:0x111111})
)

gun.position.set(0.5,-0.4,-1)
camera.add(gun)
scene.add(camera)

// inimigos
let enemies = []

function spawnEnemy(){

let enemy = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff0000})
)

enemy.position.set(
(Math.random()-0.5)*80,
1,
(Math.random()-0.5)*80
)

enemy.health = 100

scene.add(enemy)
enemies.push(enemy)

}

for(let i=0;i<6;i++) spawnEnemy()

// estado jogador
let hp = 100
let ammo = 30
let maxAmmo = 30

// teclas
const keys = {}

document.addEventListener("keydown",e=>{
keys[e.code]=true
})

document.addEventListener("keyup",e=>{
keys[e.code]=false
})

// física
let velocity = new THREE.Vector3()
let direction = new THREE.Vector3()

let canJump=false
let crouching=false

// tiro
document.addEventListener("mousedown",()=>{

if(ammo<=0) return

ammo--

let raycaster = new THREE.Raycaster()

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
)

let hits = raycaster.intersectObjects(enemies)

if(hits.length>0){

let enemy = hits[0].object

enemy.health -= 50

enemy.material.color.set(0xffff00)

if(enemy.health<=0){

scene.remove(enemy)
enemies.splice(enemies.indexOf(enemy),1)
spawnEnemy()

}

}

})

// recarregar
document.addEventListener("keydown",e=>{
if(e.code==="KeyR"){
ammo = maxAmmo
}
})

// movimento
function updatePlayer(){

direction.z = Number(keys["KeyW"]) - Number(keys["KeyS"])
direction.x = Number(keys["KeyD"]) - Number(keys["KeyA"])
direction.normalize()

let speed = keys["ShiftLeft"] ? 0.25 : 0.12

if(keys["ControlLeft"]){
speed *=0.5
crouching=true
camera.position.y = 1
}else{
crouching=false
camera.position.y = 1.6
}

if(keys["Space"] && canJump){
velocity.y = 0.2
canJump=false
}

velocity.y -= 0.01

controls.moveRight(direction.x * speed)
controls.moveForward(direction.z * speed)

controls.getObject().position.y += velocity.y

if(controls.getObject().position.y < 1.6){

velocity.y = 0
controls.getObject().position.y = 1.6
canJump=true

}

}

// IA inimigos
function updateEnemies(){

enemies.forEach(enemy=>{

let dir = new THREE.Vector3()

dir.subVectors(
controls.getObject().position,
enemy.position
)

let dist = dir.length()

dir.normalize()

if(dist < 30){

enemy.position.add(dir.multiplyScalar(0.05))

}

if(dist < 2){

hp -= 0.1

}

})

}

// HUD
function updateHUD(){

document.getElementById("hud").innerHTML =
"HP:"+Math.floor(hp)+" | Ammo:"+ammo

}

// loop
function animate(){

requestAnimationFrame(animate)

updatePlayer()
updateEnemies()
updateHUD()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
