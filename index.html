<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FPS Mobile</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
touch-action:none;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:24px;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:14px;
}

#joystick{
position:absolute;
bottom:80px;
left:40px;
width:120px;
height:120px;
background:rgba(255,255,255,0.1);
border-radius:50%;
}

#stick{
position:absolute;
width:60px;
height:60px;
background:rgba(255,255,255,0.4);
border-radius:50%;
left:30px;
top:30px;
}

#shoot{
position:absolute;
bottom:100px;
right:40px;
width:80px;
height:80px;
background:red;
border-radius:50%;
color:white;
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
}

#reload{
position:absolute;
bottom:200px;
right:50px;
width:60px;
height:60px;
background:blue;
border-radius:50%;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div id="crosshair">+</div>
<div id="hud">HP:100 | Ammo:30</div>

<div id="joystick">
<div id="stick"></div>
</div>

<div id="shoot">FIRE</div>
<div id="reload">R</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.y = 1.6

// luz
let light = new THREE.HemisphereLight(0xffffff,0x444444)
scene.add(light)

// chão
let floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshStandardMaterial({color:0x333333})
)

floor.rotation.x = -Math.PI/2
scene.add(floor)

// arma
let gun = new THREE.Mesh(
new THREE.BoxGeometry(0.3,0.2,1),
new THREE.MeshStandardMaterial({color:0x111111})
)

gun.position.set(0.5,-0.4,-1)

camera.add(gun)
scene.add(camera)

// inimigos
let enemies=[]

function spawnEnemy(){

let enemy = new THREE.Mesh(
new THREE.BoxGeometry(1,2,1),
new THREE.MeshStandardMaterial({color:0xff0000})
)

enemy.position.set(
(Math.random()-0.5)*80,
1,
(Math.random()-0.5)*80
)

enemy.hp = 100

scene.add(enemy)
enemies.push(enemy)

}

for(let i=0;i<5;i++) spawnEnemy()

// estado jogador
let hp = 100
let ammo = 30

// joystick
let joyX=0
let joyY=0

let stick = document.getElementById("stick")

document.getElementById("joystick").addEventListener("touchmove",e=>{

let rect = e.target.getBoundingClientRect()

let x = e.touches[0].clientX - rect.left - 60
let y = e.touches[0].clientY - rect.top - 60

joyX = x/40
joyY = y/40

stick.style.left = (x+30)+"px"
stick.style.top = (y+30)+"px"

})

document.getElementById("joystick").addEventListener("touchend",()=>{

joyX=0
joyY=0

stick.style.left="30px"
stick.style.top="30px"

})

// mirar com dedo
let lastX=null

document.addEventListener("touchmove",e=>{

if(e.touches.length==1){

if(lastX!=null){

let dx = e.touches[0].clientX-lastX

camera.rotation.y -= dx*0.005

}

lastX = e.touches[0].clientX

}

})

document.addEventListener("touchend",()=>{
lastX=null
})

// tiro
document.getElementById("shoot").addEventListener("touchstart",()=>{

if(ammo<=0) return

ammo--

let raycaster = new THREE.Raycaster()

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
)

let hits = raycaster.intersectObjects(enemies)

if(hits.length>0){

let enemy = hits[0].object

enemy.hp -= 50
enemy.material.color.set(0xffff00)

if(enemy.hp<=0){

scene.remove(enemy)
enemies.splice(enemies.indexOf(enemy),1)
spawnEnemy()

}

}

})

// recarregar
document.getElementById("reload").addEventListener("touchstart",()=>{

ammo=30

})

// movimento
function updatePlayer(){

let speed=0.2

camera.position.x += joyX*speed
camera.position.z += joyY*speed

}

// IA inimigos
function updateEnemies(){

enemies.forEach(enemy=>{

let dir = new THREE.Vector3()

dir.subVectors(camera.position,enemy.position)

let dist = dir.length()

dir.normalize()

if(dist<30){

enemy.position.add(dir.multiplyScalar(0.03))

}

if(dist<2){

hp -=0.05

}

})

}

// HUD
function updateHUD(){

document.getElementById("hud").innerHTML =
"HP:"+Math.floor(hp)+" | Ammo:"+ammo

}

// loop
function animate(){

requestAnimationFrame(animate)

updatePlayer()
updateEnemies()
updateHUD()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
