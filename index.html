<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FPS Shooter</title>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:30px;
color:white;
}

#hud{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:18px;
}

</style>

</head>
<body>

<div id="crosshair">+</div>
<div id="hud">Munição: 30</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.y = 1.6

// luz
let light = new THREE.HemisphereLight(0xffffff,0x444444)
scene.add(light)

// chão
let floorGeo = new THREE.PlaneGeometry(200,200)
let floorMat = new THREE.MeshStandardMaterial({color:0x333333})

let floor = new THREE.Mesh(floorGeo,floorMat)

floor.rotation.x = -Math.PI/2
scene.add(floor)

// inimigo
let enemyGeo = new THREE.BoxGeometry(1,2,1)
let enemyMat = new THREE.MeshStandardMaterial({color:0xff0000})

let enemy = new THREE.Mesh(enemyGeo,enemyMat)

enemy.position.set(0,1,-20)

scene.add(enemy)

// arma
let gunGeo = new THREE.BoxGeometry(0.3,0.2,1)
let gunMat = new THREE.MeshStandardMaterial({color:0x222222})

let gun = new THREE.Mesh(gunGeo,gunMat)

gun.position.set(0.5,-0.4,-1)

camera.add(gun)
scene.add(camera)

// munição
let ammo = 30

// tiro
window.addEventListener("click",()=>{

if(ammo <=0) return

ammo--

document.getElementById("hud").innerHTML = "Munição: " + ammo

let raycaster = new THREE.Raycaster()

raycaster.setFromCamera(
new THREE.Vector2(0,0),
camera
)

let hit = raycaster.intersectObject(enemy)

if(hit.length > 0){

enemy.material.color.set(0x00ff00)

}

})

// movimento
let keys = {}

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()] = true
})

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()] = false
})

function move(){

if(keys["w"]) camera.position.z -= 0.2
if(keys["s"]) camera.position.z += 0.2
if(keys["a"]) camera.position.x -= 0.2
if(keys["d"]) camera.position.x += 0.2

}

// mouse FPS
document.body.addEventListener("mousemove",(e)=>{

if(document.pointerLockElement === document.body){

camera.rotation.y -= e.movementX * 0.002
camera.rotation.x -= e.movementY * 0.002

}

})

document.body.onclick = ()=>{
document.body.requestPointerLock()
}

// loop
function animate(){

requestAnimationFrame(animate)

move()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
